<div class="site-header">
  <div class="site-brand-group">
    <details class="site-menu">
      <summary aria-label="Menu">
        <span class="menu-lines" aria-hidden="true"></span>
      </summary>
      <nav aria-label="Hoofdnavigatie">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </details>

    <a href="{{ "" | relURL }}" class="site-wordmark" aria-label="Zemelaar home">
      <span>Zemelaar.</span>
      <small>Korte stukken.</small>
    </a>
  </div>

  <a href="{{ "" | relURL }}" class="site-logo" aria-label="Zemelaar home">
    <img src="/uploads/site/zemelaar-logo-dark-1.png" alt="Zemelaar">
  </a>
</div>
