<style>
  .site-header {
    justify-content: flex-start;
  }

  .site-brand-group {
    display: flex;
    align-items: center;
    gap: 1em;
  }

  .site-wordmark {
    color: var(--zemelaar-green-dark);
    font-family: "Literata", Georgia, serif;
    font-size: 1.45rem;
    font-style: italic;
    font-weight: 500;
    line-height: 1;
    text-decoration: none;
  }

  .site-wordmark:hover,
  .site-wordmark:focus {
    color: var(--zemelaar-green);
  }
</style>

<div class="site-header">
  <div class="site-brand-group">
    <details class="site-menu">
      <summary aria-label="Menu">
        <span class="menu-lines" aria-hidden="true"></span>
      </summary>
      <nav aria-label="Hoofdnavigatie">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </details>

    <a href="{{ "" | relURL }}" class="site-wordmark" aria-label="Zemelaar home">Zemelaar</a>
  </div>
</div>
