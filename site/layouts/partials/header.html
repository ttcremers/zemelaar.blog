<style>
  .site-header {
    justify-content: space-between;
  }

  .site-brand-group {
    display: flex;
    align-items: center;
    gap: 1em;
  }

  .site-wordmark {
    display: flex;
    align-items: baseline;
    gap: 0.65em;
    color: var(--zemelaar-green-dark);
    font-family: "Literata", Georgia, serif;
    font-size: 1.45rem;
    font-style: italic;
    font-weight: 500;
    line-height: 1;
    text-decoration: none;
  }

  .site-wordmark small {
    color: var(--zemelaar-text);
    font-size: 0.62em;
    font-style: normal;
    font-weight: 500;
  }

  .site-wordmark:hover,
  .site-wordmark:focus {
    color: var(--zemelaar-green);
  }
</style>

<div class="site-header">
  <div class="site-brand-group">
    <details class="site-menu">
      <summary aria-label="Menu">
        <span class="menu-lines" aria-hidden="true"></span>
      </summary>
      <nav aria-label="Hoofdnavigatie">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </details>

    <a href="{{ "" | relURL }}" class="site-wordmark" aria-label="Zemelaar home">
      <span>Zemelaar.</span>
      <small>Korte stukken.</small>
    </a>
  </div>

  <a href="{{ "" | relURL }}" class="site-logo" aria-label="Zemelaar home">
    <img src="/uploads/site/zemelaar-logo-dark-1.png" alt="Zemelaar">
  </a>
</div>
